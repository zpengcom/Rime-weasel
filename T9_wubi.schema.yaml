# Rime 输入法方案配置文件：t9_wubi
# 九宫格五笔混输 + 英文支持
# encoding: utf-8

# ============================================================================
# 【方案信息】
# ============================================================================
schema:
  schema_id: t9_wubi              # 方案唯一标识符
  name: "九键五笔"                # 方案显示名称
  version: "1.0"
  author:
    - 王永民先生                   # 五笔发明者
  description: |
    中文九键五笔混输 + 英文
    用手机九宫格数字键盘输入五笔编码
    数字 2-9 分别对应拼音首字母 abc-xyz
  dependencies:
    - wubi86_jidian               # 极点五笔字库
    - pinyin_simp                  # 拼音反查词库
    - eng                         # 英文支持

# ============================================================================
# 【功能开关】
# ============================================================================
switches:
  - name: ascii_mode              # 中英文切换
    reset: 0                       # 默认值：0=中文，1=英文
    states: [ 中文, 西文 ]         # 显示名称
  - name: ascii_punct  # 中英标点
    states: [ ¥。, $. ]
  - name: extended_charset        # 扩展字符集
    states: [ 常用, 增廣 ]         # 繁体字显示
  - name: traditionalization
    states: [ 简, 繁 ]
#  - name: show_emoji                 # 显示emoji 表情（自定义功能）
#    reset: 1
#    states: [ 😔, 😀 ]
  - name: emoji_suggestion        # emoji 建议
    reset: 1
    states: [ "🈚︎", "🈶️" ]
  - name: full_shape              # 全角/半角
    states: [ 半角, 全角 ]

# ============================================================================
# 【输入引擎配置】
# ============================================================================
engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator            # 标点符号
    - table_translator            # 五笔表格翻译（主翻译器）
    - script_translator@eng       # 英文支持
    - lua_translator@*date_translator  # 日期时间
  filters:
    - simplifier@emoji            # emoji 转换
    - uniquifier                  # 去重

# ============================================================================
# 【emoji 配置】
# ============================================================================
emoji_suggestion:
  opencc_config: emoji.json
  option_name: emoji_suggestion
  tips: none
  inherit_comment: false

# ============================================================================
# 【拼写器配置】处理九宫格数字映射
# ============================================================================
speller:
  # 字母表：包括小写字母、大写字母、数字、等号等
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA9876543210=
  initials: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA9876543210=
  delimiter: " ;'"
  algebra:
    # 五笔原始编码处理
    - erase/^([a-z]{4})$/$1/      # 擦除原始编码
    
    # ===== 九宫格数字映射规则 =====
    # 手机九宫格键盘对应：
    # 2: abc    3: def    4: ghi
    # 5: jkl    6: mno    7: pqrs
    # 8: tuv    9: wxyz
    
    - derive/[abc]/2/             # a、b、c → 2
    - derive/[def]/3/             # d、e、f → 3
    - derive/[ghi]/4/             # g、h、i → 4
    - derive/[jkl]/5/             # j、k、l → 5
    - derive/[mno]/6/             # m、n、o → 6
    - derive/[pqrs]/7/            # p、q、r、s → 7
    - derive/[tuv]/8/             # t、u、v → 8
    - derive/[wxyz]/9/            # w、x、y、z → 9

# ============================================================================
# 【五笔翻译器配置】
# ============================================================================
translator:
  dictionary: wubi86              # 五笔字典
  prism: t9_wubi                  # 棱镜文件（九宫格编码映射）
  enable_charset_filter: true     # 启用字符集过滤
  enable_sentence: true           # 启用词组
  enable_encoder: true            # 启用编码
  max_phrase_length: 4            # 最长词组长度
  initial_quality: 1.2            # 初始权重（五笔优先）

# ============================================================================
# 【英文翻译器配置】
# ============================================================================
eng:
  dictionary: eng                 # 英文字典
  enable_sentence: false          # 禁止造句
  enable_user_dict: false         # 禁用用户词典
  initial_quality: 1.1            # 初始权重（英文次优先）
  comment_format:
    - xform/.*//                  # 隐藏英文提示

# ============================================================================
# 【标点符号配置】
# ============================================================================
punctuator:
  full_shape:                     # 全角标点
    ' ' : { commit: '　' }
    ',' : { commit: ， }
    '.' : { commit: 。 }
    '?' : { commit: ？ }
    ';' : { commit: ； }
    ':' : { commit: ： }
    '!' : { commit: ！ }
  half_shape:                     # 半角标点
    ',' : '，'
    '.' : '。'
    '?' : '？'
    ';' : '；'
    ':' : '：'
    '!' : '！'

# ============================================================================
# 【按键绑定】
# ============================================================================
key_binder:
  import_preset: default
  bindings:
    # 九宫格特殊用法：按 1 可以分词
    - { when: has_menu, accept: 1, send: apostrophe }

# ============================================================================
# 【识别器配置】
# ============================================================================
recognizer:
  import_preset: default          # 使用默认识别规则

# ============================================================================
# 【菜单配置】
# ============================================================================
menu:
  page_size: 10                   # 每页 10 个候选词

# ============================================================================
# 【使用说明】
# ============================================================================
# 1. 数字键输入：
#    输入 "2" (abc) → 显示所有 a、b、c 开头的五笔编码的字
#    输入 "9" (wxyz) → 显示所有 w、x、y、z 开头的五笔编码的字
#
# 2. 英文输入：
#    直接输入英文单词（如 hello）→ 显示英文候选词
#
# 3. 分词：
#    在有候选词时按 1 → 进入分词模式
#
# 4. 例子：
#    输入 "2345" → 搜索所有以 a、d、j、j 开头的五笔组合
#    输入 "hello" → 显示英文单词 hello